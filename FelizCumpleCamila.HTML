<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Feliz Cumpleaños Camila</title>
<style>
    body {
        margin: 0;
        background: white;
        overflow: hidden;
        font-family: Arial, sans-serif;
    }

    h1 {
        text-align: center;
        color: #40E0D0; /* verde agua */
        margin-top: 50px;
        font-size: 50px;
    }

    /* Flores */
    .flor {
        position: absolute;
        width: 60px;
        height: 60px;
    }

    .petalo {
        width: 30px;
        height: 30px;
        background: pink;
        border-radius: 50%;
        position: absolute;
    }

    .centro {
        width: 30px;
        height: 30px;
        background: yellow;
        border-radius: 50%;
        position: absolute;
        top: 15px;
        left: 15px;
    }

    /* Mariposas */
    .mariposa {
        position: absolute;
        width: 40px;
        height: 40px;
        animation: volar 6s infinite alternate ease-in-out;
    }

    .ala {
        width: 20px;
        height: 20px;
        background: #40E0D0;
        border-radius: 50%;
        position: absolute;
    }

    .cuerpo {
        width: 5px;
        height: 30px;
        background: black;
        position: absolute;
        left: 17px;
    }

    @keyframes volar {
        from { transform: translateY(0px); }
        to { transform: translateY(-50px); }
    }
</style>
</head>
<body>

<h1>¡Feliz Cumpleaños Camila!</h1>

<!-- Flores -->
<div class="flor" style="top:300px; left:100px;">
    <div class="petalo" style="top:0; left:15px;"></div>
    <div class="petalo" style="top:15px; left:0;"></div>
    <div class="petalo" style="top:15px; left:30px;"></div>
    <div class="petalo" style="top:30px; left:15px;"></div>
    <div class="centro"></div>
</div>

<div class="flor" style="top:350px; left:400px;">
    <div class="petalo" style="top:0; left:15px;"></div>
    <div class="petalo" style="top:15px; left:0;"></div>
    <div class="petalo" style="top:15px; left:30px;"></div>
    <div class="petalo" style="top:30px; left:15px;"></div>
    <div class="centro"></div>
</div>

<!-- Mariposas -->
<div class="mariposa" style="top:200px; left:300px;">
    <div class="ala" style="left:0;"></div>
    <div class="ala" style="right:0;"></div>
    <div class="cuerpo"></div>
</div>

<div class="mariposa" style="top:150px; left:600px;">
    <div class="ala" style="left:0;"></div>
    <div class="ala" style="right:0;"></div>
    <div class="cuerpo"></div>
</div>

</body>
</html>
